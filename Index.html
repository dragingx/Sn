<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPJ Supply Premium T-Shirts</title>
<style>
/* BASE */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#050505;color:#fff;overflow-x:hidden;font-size:0.9rem;line-height:1.4;position:relative;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* NAV */
nav{position:fixed;width:100%;padding:12px 20px;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);display:flex;justify-content:space-between;align-items:center;z-index:100;font-weight:700;font-size:1rem;}

/* GRID */
.grid{display:grid;grid-template-columns:1fr;gap:15px;padding:90px 15px 40px;transition:all 0.3s ease;}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr;}}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr;}}

/* CARD */
.card{position:relative;overflow:hidden;background:#111;padding:20px;border-radius:10px;transition:transform 0.3s ease, box-shadow 0.3s ease;}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(255,255,255,0.1);}
.title{font-weight:700;font-size:1.05rem;margin-bottom:5px;}
.price{color:#FFD700;font-weight:600;margin-bottom:3px;}
.availability{color:#FF6F61;font-size:0.85rem;margin-bottom:10px;}
.buy{padding:8px;background:#FFD700;color:#000;border:none;border-radius:6px;font-weight:600;transition:0.2s;}
.buy:hover{opacity:0.9;}

/* CART */
.cart{position:fixed;right:-300px;top:0;width:280px;height:100%;background:#0a0a0a;padding:20px;transition:0.4s;z-index:200;font-size:0.85rem;overflow-y:auto;border-left:1px solid #333;}
.cart.open{right:0;}
.cart h4{margin-bottom:15px;font-size:1rem;text-transform:uppercase;}
.cart a{color:#FFD700;display:block;margin-bottom:6px;font-size:0.9rem;}

/* FOOTER */
footer{text-align:center;padding:25px;font-size:0.7rem;opacity:0.5;position:relative;z-index:10;}

/* CURSOR EFFECT */
.cursor{
  width:14px;height:14px;border:1px solid #fff;border-radius:50%;
  position:fixed;pointer-events:none;transform:translate(-50%,-50%);
  transition:0.1s ease;z-index:9999;
}
.cursor.active{transform:translate(-50%,-50%) scale(2);background:rgba(255,255,255,0.1);}

/* PARTICLES */
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<nav>
  <div>MPJ SUPPLY</div>
  <div onclick="toggleCart()">CART</div>
</nav>

<div class="cart" id="cart">
  <h4>Cart</h4>
  <div id="cartItems"></div>
</div>

<section class="grid" id="product-grid"></section>

<footer>MPJ SUPPLY — 2026</footer>

<script>
// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{cursor.style.left=e.clientX+"px";cursor.style.top=e.clientY+"px";});
document.addEventListener("mouseover",e=>{
  if(e.target.tagName==="BUTTON"||e.target.tagName==="A") cursor.classList.add("active");
  else cursor.classList.remove("active");
});

// CART
function toggleCart(){document.getElementById("cart").classList.toggle("open");}
function addToCart(e,name,link){e.stopPropagation();document.getElementById("cartItems").innerHTML+=`<a href="${link}" target="_blank">${name}</a>`;}

// REAL PRODUCTS WITH LINKS
const products = [
  {name:"Classic Black Tee", price:"$25.00", availability:"In Stock", link:"https://www.ebay.com/itm/318032177576"},
  {name:"Vintage White Tee", price:"$30.00", availability:"In Stock", link:"https://www.ebay.com/itm/317818805275"},
  {name:"Marvin Pickle Juice Tee", price:"$35.00", availability:"Limited Stock", link:"https://www.ebay.com/itm/317815923757"}
];

// RENDER PRODUCTS
const grid=document.getElementById("product-grid");
products.forEach(p=>{
  grid.innerHTML+=`
    <div class="card">
      <div class="title">${p.name}</div>
      <div class="price">${p.price}</div>
      <div class="availability">${p.availability}</div>
      <button class="buy" onclick="window.open('${p.link}','_blank')">BUY NOW</button>
    </div>
  `;
});

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let particles=[];
for(let i=0;i<150;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3});
}
window.addEventListener("resize",()=>{canvas.width=innerWidth; canvas.height=innerHeight;});
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x>canvas.width)p.x=0;if(p.x<0)p.x=canvas.width;
    if(p.y>canvas.height)p.y=0;if(p.y<0)p.y=canvas.height;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>

</body>
</html>
