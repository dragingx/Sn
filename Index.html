<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPJ Supply</title>
<style>
/* GLOBAL STYLES */
*{margin:0;padding:0;box-sizing:border-box;font-family:Helvetica,Arial,sans-serif;}
body{background:#050505;color:#fff;overflow-x:hidden;cursor:none;}

/* CURSOR */
.cursor{
    width:20px;height:20px;border:1px solid #fff;border-radius:50%;
    position:fixed;pointer-events:none;transform:translate(-50%,-50%);
    transition:0.15s ease;z-index:9999;
}
.cursor.active{transform:translate(-50%,-50%) scale(2);background:rgba(255,255,255,0.1);}

/* CANVAS */
canvas{position:fixed;top:0;left:0;z-index:-1;}

/* NAV */
nav{
    position:fixed;width:100%;padding:20px 40px;
    backdrop-filter:blur(14px);background:rgba(0,0,0,0.3);
    display:flex;justify-content:space-between;z-index:100;
}
.logo{letter-spacing:4px;font-weight:600;}

/* HERO */
.hero{
    height:100vh;display:flex;justify-content:center;align-items:center;
    flex-direction:column;text-align:center;
}
.hero h1{font-size:4rem;letter-spacing:10px;transform:translateY(40px);opacity:0;animation:fadeUp 1s forwards;}
.hero p{opacity:0.5;letter-spacing:3px;margin-top:10px;animation:fadeUp 1.3s forwards;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:50px;padding:100px;}

/* CARD */
.card{position:relative;overflow:hidden;text-decoration:none;color:white;transition:transform 0.2s ease;}
.card img{width:100%;height:420px;object-fit:cover;transition:0.6s ease;}
.card:hover img.first{opacity:0;}
.card img.second{position:absolute;top:0;left:0;opacity:1;transition:0.6s ease;}

/* OVERLAY */
.overlay{
    position:absolute;bottom:0;width:100%;
    padding:20px;background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    display:flex;flex-direction:column;
}
.overlay .price{font-size:1.3rem;font-weight:700;color:#FFD700;animation:fadeInUp 0.4s ease;}
.overlay .availability{font-size:0.75rem;color:#FF6F61;letter-spacing:1px;margin-bottom:6px;}
.overlay .title{font-size:0.95rem;letter-spacing:1px;}
.overlay .add{margin-top:10px;font-size:0.75rem;opacity:0.8;cursor:pointer;transition:0.2s;letter-spacing:0.5px;}
.overlay .add:hover{opacity:1;color:#FFD700;}

/* TAG */
.tag{position:absolute;top:15px;left:15px;font-size:0.7rem;padding:6px 12px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);letter-spacing:1px;}

/* CART */
.cart{position:fixed;right:-400px;top:0;width:400px;height:100%;background:#0a0a0a;padding:30px;transition:0.4s;z-index:200;}
.cart.open{right:0;}

/* ANIMATION */
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:60px 20px;font-size:0.7rem;opacity:0.4;}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<nav>
    <div class="logo">MPJ SUPPLY</div>
    <div onclick="toggleCart()">CART</div>
</nav>

<div class="cart" id="cart">
    <h3>Cart</h3>
    <div id="cartItems" style="margin-top:15px;opacity:0.7;"></div>
</div>

<section class="hero">
    <h1>MPJ</h1>
    <p>stay brined</p>
</section>

<section class="grid">

<!-- ITEM 01 -->
<div class="card" data-name="Item 01">
    <div class="tag">LIMITED</div>
    <a href="https://www.ebay.com/itm/318032177576" target="_blank">
        <img class="first" src="https://i.ebayimg.com/images/g/6mIAAOSwV1ZjX6FY/s-l1600.jpg" alt="Item 01 Front">
        <img class="second" src="https://i.ebayimg.com/images/g/6mIAAOSwV1ZjX6FY/s-l1600.jpg" alt="Item 01 Hover">
    </a>
    <div class="overlay">
        <div class="price">$29.99</div>
        <div class="availability">Limited Stock</div>
        <div class="title">ITEM 01</div>
        <div class="add" onclick="addToCart(event,'Item 01')">ADD</div>
    </div>
</div>

<!-- ITEM 02 -->
<div class="card" data-name="Item 02">
    <div class="tag">LIMITED</div>
    <a href="https://www.ebay.com/itm/317818805275" target="_blank">
        <img class="first" src="https://i.ebayimg.com/images/g/a4QAAOSwgdNpe9Jt/s-l1600.jpg" alt="Item 02 Front">
        <img class="second" src="https://i.ebayimg.com/images/g/a4QAAOSwgdNpe9Jt/s-l1600.jpg" alt="Item 02 Hover">
    </a>
    <div class="overlay">
        <div class="price">$34.50</div>
        <div class="availability">Limited Stock</div>
        <div class="title">ITEM 02</div>
        <div class="add" onclick="addToCart(event,'Item 02')">ADD</div>
    </div>
</div>

<!-- ITEM 03 -->
<div class="card" data-name="Item 03">
    <div class="tag">LIMITED</div>
    <a href="https://www.ebay.com/itm/317815923757" target="_blank">
        <img class="first" src="https://i.ebayimg.com/images/g/pxEAAOSw-Pppeu5H/s-l1600.jpg" alt="Item 03 Front">
        <img class="second" src="https://i.ebayimg.com/images/g/pxEAAOSw-Pppeu5H/s-l1600.jpg" alt="Item 03 Hover">
    </a>
    <div class="overlay">
        <div class="price">$22.75</div>
        <div class="availability">In Stock</div>
        <div class="title">ITEM 03</div>
        <div class="add" onclick="addToCart(event,'Item 03')">ADD</div>
    </div>
</div>

</section>

<footer>MPJ SUPPLY — 2026</footer>

<script>
/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{cursor.style.left=e.clientX+"px";cursor.style.top=e.clientY+"px";});
document.querySelectorAll("a,.add").forEach(el=>{el.addEventListener("mouseenter",()=>cursor.classList.add("active"));el.addEventListener("mouseleave",()=>cursor.classList.remove("active"));});

/* CART */
function toggleCart(){document.getElementById("cart").classList.toggle("open");}
function addToCart(e,name){e.stopPropagation();document.getElementById("cartItems").innerHTML+=`<div>${name}</div>`;}

/* PARTICLES BACKGROUND */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;
let mouse={x:0,y:0};
document.addEventListener("mousemove",e=>{mouse.x=e.x;mouse.y=e.y;});
let particles=[];
for(let i=0;i<120;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2,vx:(Math.random()-0.5)*0.5,vy:Math.random()*1+0.2});}
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        let dx=mouse.x-p.x; let dy=mouse.y-p.y; let dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){p.x-=dx*0.01;p.y-=dy*0.01;}
        p.x+=p.vx;p.y+=p.vy;if(p.y>canvas.height)p.y=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
window.addEventListener("resize",()=>{canvas.width=innerWidth;canvas.height=innerHeight;});
</script>

</body>
</html>
